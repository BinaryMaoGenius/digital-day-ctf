# ─── Nginx Configuration - CTF Digital Day ─────────────────────────────────
# Architecture : Zugenberg (Reverse Proxy + Rate Limiting + Sécurité)
# Participants max : 25 → paramètres optimisés pour charge légère mais robustes

# Exploite tous les cœurs disponibles
worker_processes auto;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    tcp_nopush    on;
    tcp_nodelay   on;
    keepalive_timeout 65;
    keepalive_requests 1000;

    # ── Logs ───────────────────────────────────────────────────────────────
    access_log    /dev/stdout;
    error_log     /dev/stderr warn;

    # ── Compression ────────────────────────────────────────────────────────
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               application/x-font-ttf font/opentype image/svg+xml;

    # ── Headers de sécurité (valables pour toutes les réponses) ────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Cache le numéro de version de Nginx aux attaquants
    server_tokens off;

    # ── Rate Limiting ──────────────────────────────────────────────────────
    # Zone globale : 30 req/s par IP pour la plateforme principale
    limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;

    # Zone cibles CTF : plus permissive pour laisser les joueurs explorer,
    # mais protège contre les brute-force automatisés
    limit_req_zone $binary_remote_addr zone=ctf_targets:10m rate=15r/s;

    # Taille maximale du corps d'une requête (empêche les uploads massifs)
    client_max_body_size 2m;
    client_body_timeout 10s;
    client_header_timeout 10s;
    send_timeout 10s;

    # ── Upstreams ──────────────────────────────────────────────────────────
    upstream ctf_webapp {
        server webapp:8888;
        keepalive 16;
    }

    upstream target_segou {
        server target-segou:8001;
        keepalive 8;
    }

    upstream target_bougouni {
        server target-bougouni:8002;
        keepalive 8;
    }

    upstream target_taoudeni {
        server target-taoudeni:8003;
        keepalive 8;
    }

    upstream target_tessalit {
        server target-tessalit:8004;
        keepalive 8;
    }

    upstream target_san {
        server target-san:8005;
        keepalive 8;
    }

    upstream target_gao {
        server target-gao:8006;
        keepalive 8;
    }

    upstream target_djenne {
        server target-djenne:8007;
        keepalive 8;
    }

    upstream target_kidal {
        server target-kidal:8008;
        keepalive 8;
    }

    server {
        listen 80;
        server_name _;

        # ── Application principale (RootTheBox) ───────────────────────────
        location / {
            limit_req zone=general burst=50 nodelay;

            proxy_pass http://ctf_webapp;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support (obligatoire pour RootTheBox)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Timeouts proxy
            proxy_connect_timeout 5s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # ── TECHNICAL TARGETS (Zugenberg Architecture) ───────────────────

        location /gate/segou/ {
            limit_req zone=ctf_targets burst=30 nodelay;
            proxy_pass http://target_segou/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_connect_timeout 5s;
            proxy_read_timeout 20s;
        }

        location /gate/bougouni/ {
            limit_req zone=ctf_targets burst=30 nodelay;
            proxy_pass http://target_bougouni/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_connect_timeout 5s;
            proxy_read_timeout 20s;
        }

        location /gate/taoudeni/ {
            limit_req zone=ctf_targets burst=30 nodelay;
            proxy_pass http://target_taoudeni/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_connect_timeout 5s;
            proxy_read_timeout 20s;
        }

        location /gate/tessalit/ {
            limit_req zone=ctf_targets burst=30 nodelay;
            proxy_pass http://target_tessalit/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_connect_timeout 5s;
            proxy_read_timeout 20s;
        }

        location /gate/san/ {
            limit_req zone=ctf_targets burst=30 nodelay;
            proxy_pass http://target_san/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_connect_timeout 5s;
            proxy_read_timeout 20s;
        }

        location /gate/gao/ {
            limit_req zone=ctf_targets burst=30 nodelay;
            proxy_pass http://target_gao/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_connect_timeout 5s;
            proxy_read_timeout 20s;
        }

        location /gate/djenne/ {
            limit_req zone=ctf_targets burst=30 nodelay;
            proxy_pass http://target_djenne/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_connect_timeout 5s;
            proxy_read_timeout 20s;
        }

        location /gate/kidal/ {
            limit_req zone=ctf_targets burst=30 nodelay;
            proxy_pass http://target_kidal/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_connect_timeout 5s;
            proxy_read_timeout 20s;
        }

        # ── Pages d'erreur personnalisées ─────────────────────────────────
        error_page 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }
    }
}
