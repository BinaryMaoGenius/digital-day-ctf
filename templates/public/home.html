{% extends "../main.html" %}

{% block title %}
    {% from tornado.options import options %}
    {{ options.game_name }}
{% end %}

{% block content %}
    <div id="home_container" class="container text-center" style="margin-top: 50px;">
        <div class="well card-main pulse-primary" style="padding: 50px; min-height: 400px; display: flex; flex-direction: column; align-items: center; justify-content: center;">
            <img src="{{options.ctf_logo}}" style="max-width: 400px; filter: drop-shadow(0 0 15px var(--primary-neon)); margin-bottom: 30px;">
            <h1 class="cyber-glow" style="font-size: 3.5em; margin-bottom: 10px;">{{options.game_name}}</h1>
            <h3 class="matrix-text" style="letter-spacing: 5px; text-transform: uppercase;">{{options.ctf_tagline}}</h3>
            
            <div style="margin-top: 50px;">
                <a href="/login" class="btn btn-primary btn-large" style="margin-right: 20px; width: 200px;">
                    <i class="fa fa-sign-in"></i> {{ _("LOGIN") }}
                </a>
                <a href="/registration" class="btn btn-info btn-large" style="width: 200px;">
                    <i class="fa fa-user-plus"></i> {{ _("REGISTER") }}
                </a>
            </div>
        </div>
    </div>
{% end %}
