services:
  nginx:
    image: nginx:1.25-alpine
    ports:
    - 80:80
    - 443:443
    volumes:
    - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    - ./deploy/nginx/certs:/etc/nginx/certs:ro
    depends_on:
    - webapp
    restart: unless-stopped
    networks:
    - default
    - ctf_internal
  webapp:
    build:
      context: .
      target: runtime
    ports:
    - 8888:8888
    volumes:
    - .:/opt/ctf
    - ctf_data:/opt/ctf/files
    environment:
    - SQL_DIALECT=sqlite
    - PYTHONUNBUFFERED=1
    - X_HEADERS=True
    - MEMCACHED=memcached:11211
    - AUTOSTART_GAME=True
    - DEMO=0
    - FORCE_LOCALE=fr
    - CTF_TAGLINE=Le Jeu des Hackers
    depends_on:
    - memcached
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 8192M
  memcached:
    image: memcached:1.6-alpine
    restart: unless-stopped
  tunnel:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate --url http://nginx:80
    depends_on:
    - webapp
  target-segou:
    build:
      context: ./targets/segou
    ports:
    - 8001:8001
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M
    read_only: false
    tmpfs:
    - /tmp
    pids_limit: 50
    cap_drop:
    - ALL
    security_opt:
    - no-new-privileges:true
    networks:
    - ctf_internal
  target-bougouni:
