services:
  # ── Reverse proxy (SSL termination + gzip) ─────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - webapp
    restart: unless-stopped

  # ── Digital Day CTF Application ────────────────────────────────────────────
  webapp:
    build:
      context: .
      target: runtime
    expose:
      - "8888"
    volumes:
      - .:/opt/ctf
      - ctf_data:/opt/ctf/files

    environment:
      - SQL_DIALECT=sqlite
      - PYTHONUNBUFFERED=1
      - X_HEADERS=True
      - MEMCACHED=memcached:11211
      - AUTOSTART_GAME=True
      - DEMO=1

    depends_on:
      - memcached
    restart: unless-stopped

  # ── Session Storage (Memcached) ────────────────────────────────────────────
  memcached:
    image: memcached:1.6-alpine
    restart: unless-stopped

    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8888/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  ctf_data:
    driver: local
