services:
  # ── Reverse proxy (SSL termination + gzip) ─────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - webapp
    restart: unless-stopped

  # ── Digital Day CTF Application ────────────────────────────────────────────
  webapp:
    build:
      context: .
      target: runtime
    ports:
      - "8888:8888"
    volumes:
      - .:/opt/ctf
      - ctf_data:/opt/ctf/files

    environment:
      - SQL_DIALECT=sqlite
      - PYTHONUNBUFFERED=1
      - X_HEADERS=True
      - MEMCACHED=memcached:11211
      - AUTOSTART_GAME=True
      - DEMO=1
      - FORCE_LOCALE=fr
      - CTF_TAGLINE=Le Jeu des Hackers


    depends_on:
      - memcached
    restart: unless-stopped

  memcached:
    image: memcached:1.6-alpine
    restart: unless-stopped

  # ── Cloudflare Tunnel (Global Access) ──────────────────────────────────────
  tunnel:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TOKEN}
    depends_on:
      - webapp

volumes:
  ctf_data:
    driver: local
