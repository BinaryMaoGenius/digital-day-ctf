services:
  # ── Reverse proxy (SSL termination + gzip) ─────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - webapp
    restart: unless-stopped

  # ── Digital Day CTF Application ────────────────────────────────────────────
  webapp:
    build:
      context: .
      target: runtime
    ports:
      - "8888:8888"
    volumes:
      - .:/opt/ctf
      - ctf_data:/opt/ctf/files

    environment:
      - SQL_DIALECT=sqlite
      - PYTHONUNBUFFERED=1
      - X_HEADERS=True
      - MEMCACHED=memcached:11211
      - AUTOSTART_GAME=True
      - DEMO=1
      - FORCE_LOCALE=fr
      - CTF_TAGLINE=Le Jeu des Hackers


    depends_on:
      - memcached
    restart: unless-stopped

  memcached:
    image: memcached:1.6-alpine
    restart: unless-stopped

  # ── Cloudflare Tunnel (Global Access) ──────────────────────────────────────
  tunnel:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TOKEN}
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TOKEN}
    depends_on:
      - webapp

  # ── TECHNICAL TARGETS (The Engine) ─────────────────────────────────────────
  target-segou:
    build:
      context: ./targets/segou
    ports:
      - "8001:8001"
    restart: unless-stopped

  target-bougouni:
    build:
      context: ./targets/bougouni
    ports:
      - "8002:8002"
    restart: unless-stopped

  target-taoudeni:
    build:
      context: ./targets/taoudeni
    ports:
      - "8003:8003"
    restart: unless-stopped

  target-tessalit:
    build:
      context: ./targets/tessalit
    ports:
      - "8004:8004"
    restart: unless-stopped

  target-san:
    build:
      context: ./targets/san
    ports:
      - "8005:8005"
    restart: unless-stopped

  target-gao:
    build:
      context: ./targets/gao
    ports:
      - "8006:8006"
    restart: unless-stopped

volumes:
  ctf_data:
    driver: local
